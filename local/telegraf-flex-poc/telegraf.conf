# Telegraf Flex-style gap-fill PoC — NOT part of default make up.
# inputs.exec runs scripts; outputs.opentelemetry → alloy:4317 → Grafana Cloud.
# See README.md and docs/network-observability-primer.md.

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  flush_interval = "10s"
  omit_hostname = true

[[inputs.exec]]
  commands = ["/bin/sh /scripts/srl-flex-poc.sh"]
  timeout = "30s"
  data_format = "prometheus"

[[outputs.opentelemetry]]
  service_address = "alloy:4317"
  compression = "gzip"

  [outputs.opentelemetry.attributes]
    "service.name" = "telegraf-flex-poc"
