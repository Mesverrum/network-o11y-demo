# https://oidref.com/1.3.6.1.4.1.6527.1.20
---
extends:
  - system-mib.yml
  - if-mib.yml

provider: kentik-switch

sysobjectid:
  - 1.3.6.1.4.1.6527.1.20.*       # Nokia SR Linux
  - 1.3.6.1.4.1.6527.1.20.26      # Nokia SR Linux 7220 IXR-D2L

metrics:
  # CPU Utilization - polled at 60s to support anomaly detection
  - MIB: TIMETRA-SYSTEM-MIB
    symbol:
      OID: 1.3.6.1.4.1.6527.3.1.2.1.1.1.0
      name: sgiCpuUsage
      poll_time_sec: 60
      tag: CPU
  # Memory - polled at 60s to support anomaly detection
  - MIB: TIMETRA-SYSTEM-MIB
    symbol:
      OID: 1.3.6.1.4.1.6527.3.1.2.1.1.9.0
      name: sgiKbMemoryUsed
      poll_time_sec: 60
      tag: MemoryUsed
  - MIB: TIMETRA-SYSTEM-MIB
    symbol:
      OID: 1.3.6.1.4.1.6527.3.1.2.1.1.10.0
      name: sgiKbMemoryAvailable
      poll_time_sec: 60
      tag: MemoryAvailable
  - MIB: TIMETRA-CHASSIS-MIB
    table:
      OID: 1.3.6.1.4.1.6527.3.1.2.2.1.8
      name: tmnxHwTable
    symbols:
      - OID: 1.3.6.1.4.1.6527.3.1.2.2.1.8.1.16
        name: tmnxHwOperState
        enum:
          unknown: 1
          inService: 2
          outOfService: 3
          diagnosing: 4
          failed: 5
          booting: 6
          empty: 7
          provisioned: 8
          unprovisioned: 9
          upgrade: 10
          downgrade: 11
          inServiceUpgrade: 12
          inServiceDowngrade: 13
          resetPending: 14
      - OID: 1.3.6.1.4.1.6527.3.1.2.2.1.8.1.18
        name: tmnxHwTemperature
        tag: Temperature
    metric_tags:
      - column:
          OID: 1.3.6.1.4.1.6527.3.1.2.2.1.8.1.8
          name: tmnxHwName
        tag: hw_name
      - column:
          OID: 1.3.6.1.4.1.6527.3.1.2.2.1.8.1.5
          name: tmnxHwSerialNumber
        tag: hw_serial
      - column:
          OID: 1.3.6.1.4.1.6527.3.1.2.2.1.8.1.7
          name: tmnxHwClass
        tag: hw_class
  - MIB: TIMETRA-CHASSIS-MIB
    table:
      OID: 1.3.6.1.4.1.6527.3.1.2.2.1.24.1
      name: tmnxPhysChassisFanTable
    symbols:
      - OID: 1.3.6.1.4.1.6527.3.1.2.2.1.24.1.1.2
        name: tmnxPhysChassisFanOperStatus
        enum:
          unknown: 1
          deviceStateInService: 2
          deviceStateOutOfService: 3
          deviceStateDiagnosing: 4
          deviceStateFailed: 5
          deviceStateBooting: 6
          deviceStateEmpty: 7
  - MIB: TIMETRA-CHASSIS-MIB
    table:
      OID: 1.3.6.1.4.1.6527.3.1.2.2.1.24.9
      name: tmnxPhysChassisPMTable
    symbols:
      - OID: 1.3.6.1.4.1.6527.3.1.2.2.1.24.9.1.7
        name: tmnxPhysChassisPMOutputStatus
        enum:
          unknown: 1
          online: 2
          notEquipped: 3
          failed: 4
          outOfService: 5
          degraded: 6
  - MIB: TIMETRA-BGP-MIB
    table:
      OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7
      name: tBgpPeerNgTable
    symbols:
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7.1.59
        name: tBgpPeerNgConnState
        poll_time_sec: 60
        enum:
          idle: 1
          connect: 2
          active: 3
          opensent: 4
          openconfirm: 5
          established: 6
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7.1.42
        name: tBgpPeerNgOperStatus
        enum:
          unknown: 1
          inService: 2
          outOfService: 3
          transition: 4
    metric_tags:
      - column:
          OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7.1.4
          name: tBgpPeerNgPeerGroup
        tag: peer_group
      - column:
          OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7.1.7
          name: tBgpPeerNgDescription
        tag: peer_description
      - column:
          OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7.1.65
          name: tBgpPeerNgLocalAS4Byte
        tag: local_as
      - column:
          OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7.1.66
          name: tBgpPeerNgPeerAS4Byte
        tag: peer_as
  - MIB: TIMETRA-BGP-MIB
    table:
      OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8
      name: tBgpPeerNgOperTable
    symbols:
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8.1.7
        name: tBgpPeerNgOperActivePrefixes
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8.1.10
        name: tBgpPeerNgOperFlaps
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8.1.5
        name: tBgpPeerNgOperReceivedPrefixes
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8.1.6
        name: tBgpPeerNgOperSentPrefixes
      - OID: 1.3.6.1.4.1.6527.3.1.2.14.4.8.1.90
        name: tBgpPeerNgOperEvpnActivePfxs
    metric_tags:
      - column:
          OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7.1.4
          name: tBgpPeerNgPeerGroup
        tag: peer_group
        table: tBgpPeerNgTable
      - column:
          OID: 1.3.6.1.4.1.6527.3.1.2.14.4.7.1.66
          name: tBgpPeerNgPeerAS4Byte
        tag: peer_as
        table: tBgpPeerNgTable
