[defaults]
inventory        = inventory/netbox.yml
roles_path       = roles
collections_path = /usr/share/ansible/collections:~/.ansible/collections
host_key_checking = False
timeout          = 30
stdout_callback  = yaml
retry_files_enabled = False

[inventory]
enable_plugins = netbox.netbox.nb_inventory, host_list, script, yaml, ini

[persistent_connection]
# gRPC connections to SR Linux can be slow to establish on first use
command_timeout = 60
connect_timeout = 30
