---
apiVersion: clabernetes.containerlab.dev/v1alpha1
kind: Topology
metadata:
  name: srl-telemetry
  namespace: network-lab
spec:
  deployment:
    filesFromConfigMap:
        leaf1:
          - filePath: configs/fabric/leaf1.cfg
            configMapName: srl-telemetry-leaf1-startup-config
            configMapPath: startup-config
            mode: read
        leaf2:
          - filePath: configs/fabric/leaf2.cfg
            configMapName: srl-telemetry-leaf2-startup-config
            configMapPath: startup-config
            mode: read
        leaf3:
          - filePath: configs/fabric/leaf3.cfg
            configMapName: srl-telemetry-leaf3-startup-config
            configMapPath: startup-config
            mode: read
        spine1:
          - filePath: configs/fabric/spine1.cfg
            configMapName: srl-telemetry-spine1-startup-config
            configMapPath: startup-config
            mode: read
        spine2:
          - filePath: configs/fabric/spine2.cfg
            configMapName: srl-telemetry-spine2-startup-config
            configMapPath: startup-config
            mode: read
  naming: prefixed
  definition:
    containerlab: |-
          # Nokia SR Linux Clos fabric topology for the network-o11y-demo.
          # Derived from https://github.com/srl-labs/srl-telemetry-lab (BSD-3-Clause).
          #
          # The original observability stack (gnmic, prometheus, grafana, promtail, loki)
          # has been removed — telemetry is handled by ktranslate + Grafana Alloy → Grafana Cloud.
          #
          # Telemetry configured on all SR Linux nodes (spines + leaves):
          #   gNMI  — gRPC server on mgmt NI, port 57400, TLS (clab-profile), metadata-auth
          #   SNMP  — v2c community "public" on both mgmt and default network instances
          #   sFlow — v5 sampling (1:10000) on all data-plane interfaces, default NI
          #
          # sFlow collector address is 10.0.3.2 — the collector topology node's fabric IP.
          # SR Linux cannot use the mgmt network-instance for sFlow — must use default.
          # The collector node is a fabric monitoring point; actual flow data comes from
          # softflowd (NetFlow v9) on the client nodes, managed by the network-reconciler.

          name: srl-telemetry
          prefix: ""

          topology:
            defaults:
              kind: nokia_srlinux

            kinds:
              nokia_srlinux:
                image: ghcr.io/nokia/srlinux:24.10.1
                type: ixrd2l
              linux:
                image: ghcr.io/srl-labs/network-multitool

            nodes:
              ### SPINES ###
              spine1:
                type: ixrd3l
                group: spine
                startup-config: configs/fabric/spine1.cfg

              spine2:
                type: ixrd3l
                group: spine
                startup-config: configs/fabric/spine2.cfg

              ### LEAFS ###
              leaf1:
                group: leaf
                startup-config: configs/fabric/leaf1.cfg

              leaf2:
                group: leaf
                startup-config: configs/fabric/leaf2.cfg

              leaf3:
                group: leaf
                startup-config: configs/fabric/leaf3.cfg

              ### COLLECTOR ###
              # A Linux node physically connected to leaf1 in the SR Linux fabric (leaf1:e1-2).
              # Originally intended as an sFlow relay; retained as a fabric monitoring point.
              # SR Linux nodes send sFlow counter-sample datagrams here (fabric IP 10.0.3.2/30)
              # since SR Linux cannot use the mgmt NI for sFlow — but the simulator only produces
              # counter samples, not flow-sample records. Actual flow data comes from softflowd
              # running on the client nodes (managed by the network-reconciler).
              collector:
                kind: linux
                group: collector
                exec:
                  - ip address add 10.0.3.2/30 dev eth1
                  - ip route add 10.0.0.0/8 via 10.0.3.1 dev eth1
                  - ip route add 192.168.0.0/16 via 10.0.3.1 dev eth1

              ### CLIENTS ###
              client1:
                kind: linux
                group: server
                exec:
                  - ip address add 172.17.0.1/24 dev eth1
                  - ip -6 address add 2002::172:17:0:1/96 dev eth1
                  - iperf3 -s -p 5201 -D > /dev/null 2>&1
                  - iperf3 -s -p 5202 -D > /dev/null 2>&1

              client2:
                kind: linux
                group: server
                exec:
                  - ip address add 172.17.0.2/24 dev eth1
                  - ip -6 address add 2002::172:17:0:2/96 dev eth1

              client3:
                kind: linux
                group: server
                exec:
                  - ip address add 172.17.0.3/24 dev eth1
                  - ip -6 address add 2002::172:17:0:3/96 dev eth1

            links:
              # Spine-leaf uplinks
              - endpoints: ["spine1:e1-1", "leaf1:e1-49"]
              - endpoints: ["spine1:e1-2", "leaf2:e1-49"]
              - endpoints: ["spine1:e1-3", "leaf3:e1-49"]
              - endpoints: ["spine2:e1-1", "leaf1:e1-50"]
              - endpoints: ["spine2:e1-2", "leaf2:e1-50"]
              - endpoints: ["spine2:e1-3", "leaf3:e1-50"]
              # Leaf-collector downlink (sFlow + SNMP/gNMI proxy)
              - endpoints: ["leaf1:e1-2", "collector:eth1"]
              # Leaf-client downlinks
              - endpoints: ["leaf1:e1-1", "client1:eth1"]
              - endpoints: ["leaf2:e1-1", "client2:eth1"]
              - endpoints: ["leaf3:e1-1", "client3:eth1"]
