<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580" style="background:#1a1a2e;font-family:monospace">

  <text x="450" y="32" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">SR Linux Clos Fabric</text>
  <text x="450" y="52" text-anchor="middle" fill="#888" font-size="11">eBGP underlay · iBGP EVPN overlay · gNMI + SNMP telemetry</text>

  <!-- SPINES -->
  <rect id="cell-spine1" x="180" y="85" width="140" height="50" rx="6" fill="#16213e" stroke="#4a9eff" stroke-width="2"/>
  <text x="250" y="106" text-anchor="middle" fill="#4a9eff" font-size="13" font-weight="bold">spine1</text>
  <text x="250" y="122" text-anchor="middle" fill="#aaa" font-size="10">AS 201</text>

  <rect id="cell-spine2" x="580" y="85" width="140" height="50" rx="6" fill="#16213e" stroke="#4a9eff" stroke-width="2"/>
  <text x="650" y="106" text-anchor="middle" fill="#4a9eff" font-size="13" font-weight="bold">spine2</text>
  <text x="650" y="122" text-anchor="middle" fill="#aaa" font-size="10">AS 202</text>

  <!-- LEAVES -->
  <rect id="cell-leaf1" x="80" y="265" width="120" height="50" rx="6" fill="#16213e" stroke="#00b894" stroke-width="2"/>
  <text x="140" y="286" text-anchor="middle" fill="#00b894" font-size="13" font-weight="bold">leaf1</text>
  <text x="140" y="302" text-anchor="middle" fill="#aaa" font-size="10">AS 101</text>

  <rect id="cell-leaf2" x="390" y="265" width="120" height="50" rx="6" fill="#16213e" stroke="#00b894" stroke-width="2"/>
  <text x="450" y="286" text-anchor="middle" fill="#00b894" font-size="13" font-weight="bold">leaf2</text>
  <text x="450" y="302" text-anchor="middle" fill="#aaa" font-size="10">AS 102</text>

  <rect id="cell-leaf3" x="700" y="265" width="120" height="50" rx="6" fill="#16213e" stroke="#00b894" stroke-width="2"/>
  <text x="760" y="286" text-anchor="middle" fill="#00b894" font-size="13" font-weight="bold">leaf3</text>
  <text x="760" y="302" text-anchor="middle" fill="#aaa" font-size="10">AS 103</text>

  <!-- CLIENTS -->
  <rect id="cell-client1" x="80" y="440" width="120" height="50" rx="6" fill="#16213e" stroke="#fdcb6e" stroke-width="2"/>
  <text x="140" y="461" text-anchor="middle" fill="#fdcb6e" font-size="13" font-weight="bold">client1</text>
  <text x="140" y="477" text-anchor="middle" fill="#aaa" font-size="10">172.17.0.1</text>

  <rect id="cell-client2" x="390" y="440" width="120" height="50" rx="6" fill="#16213e" stroke="#fdcb6e" stroke-width="2"/>
  <text x="450" y="461" text-anchor="middle" fill="#fdcb6e" font-size="13" font-weight="bold">client2</text>
  <text x="450" y="477" text-anchor="middle" fill="#aaa" font-size="10">172.17.0.2</text>

  <rect id="cell-client3" x="700" y="440" width="120" height="50" rx="6" fill="#16213e" stroke="#fdcb6e" stroke-width="2"/>
  <text x="760" y="461" text-anchor="middle" fill="#fdcb6e" font-size="13" font-weight="bold">client3</text>
  <text x="760" y="477" text-anchor="middle" fill="#aaa" font-size="10">172.17.0.3</text>

  <!-- LINKS spine1 to leaves -->
  <line id="cell-spine1:ethernet-1/1:leaf1:ethernet-1/49" x1="210" y1="135" x2="155" y2="265" stroke="#4a9eff" stroke-width="3" opacity="0.7"/>
  <rect id="cell-link_id:spine1:ethernet-1/1:leaf1:ethernet-1/49" x="155" y="188" width="54" height="16" rx="3" fill="#0d0d1a" opacity="0.85"/>

  <line id="cell-spine1:ethernet-1/2:leaf2:ethernet-1/49" x1="250" y1="135" x2="440" y2="265" stroke="#4a9eff" stroke-width="3" opacity="0.7"/>
  <rect id="cell-link_id:spine1:ethernet-1/2:leaf2:ethernet-1/49" x="318" y="188" width="54" height="16" rx="3" fill="#0d0d1a" opacity="0.85"/>

  <line id="cell-spine1:ethernet-1/3:leaf3:ethernet-1/49" x1="290" y1="135" x2="730" y2="265" stroke="#4a9eff" stroke-width="3" opacity="0.7"/>
  <rect id="cell-link_id:spine1:ethernet-1/3:leaf3:ethernet-1/49" x="480" y="180" width="54" height="16" rx="3" fill="#0d0d1a" opacity="0.85"/>

  <!-- LINKS spine2 to leaves -->
  <line id="cell-spine2:ethernet-1/1:leaf1:ethernet-1/50" x1="610" y1="135" x2="175" y2="265" stroke="#4a9eff" stroke-width="3" opacity="0.7"/>
  <rect id="cell-link_id:spine2:ethernet-1/1:leaf1:ethernet-1/50" x="365" y="215" width="54" height="16" rx="3" fill="#0d0d1a" opacity="0.85"/>

  <line id="cell-spine2:ethernet-1/2:leaf2:ethernet-1/50" x1="650" y1="135" x2="460" y2="265" stroke="#4a9eff" stroke-width="3" opacity="0.7"/>
  <rect id="cell-link_id:spine2:ethernet-1/2:leaf2:ethernet-1/50" x="528" y="188" width="54" height="16" rx="3" fill="#0d0d1a" opacity="0.85"/>

  <line id="cell-spine2:ethernet-1/3:leaf3:ethernet-1/50" x1="690" y1="135" x2="750" y2="265" stroke="#4a9eff" stroke-width="3" opacity="0.7"/>
  <rect id="cell-link_id:spine2:ethernet-1/3:leaf3:ethernet-1/50" x="693" y="188" width="54" height="16" rx="3" fill="#0d0d1a" opacity="0.85"/>

  <!-- LINKS leaves to clients -->
  <line id="cell-leaf1:ethernet-1/1:client1:eth1" x1="140" y1="315" x2="140" y2="440" stroke="#00b894" stroke-width="3" opacity="0.7"/>
  <rect id="cell-link_id:leaf1:ethernet-1/1:client1:eth1" x="113" y="365" width="54" height="16" rx="3" fill="#0d0d1a" opacity="0.85"/>

  <line id="cell-leaf2:ethernet-1/1:client2:eth1" x1="450" y1="315" x2="450" y2="440" stroke="#00b894" stroke-width="3" opacity="0.7"/>
  <rect id="cell-link_id:leaf2:ethernet-1/1:client2:eth1" x="423" y="365" width="54" height="16" rx="3" fill="#0d0d1a" opacity="0.85"/>

  <line id="cell-leaf3:ethernet-1/1:client3:eth1" x1="760" y1="315" x2="760" y2="440" stroke="#00b894" stroke-width="3" opacity="0.7"/>
  <rect id="cell-link_id:leaf3:ethernet-1/1:client3:eth1" x="733" y="365" width="54" height="16" rx="3" fill="#0d0d1a" opacity="0.85"/>

  <!-- LEGEND -->
  <rect x="20" y="510" width="860" height="55" rx="4" fill="#0d0d1a" opacity="0.7"/>
  <circle cx="45" cy="532" r="6" fill="#4a9eff"/>
  <text x="58" y="537" fill="#ccc" font-size="11">Spine</text>
  <circle cx="130" cy="532" r="6" fill="#00b894"/>
  <text x="143" y="537" fill="#ccc" font-size="11">Leaf</text>
  <circle cx="200" cy="532" r="6" fill="#fdcb6e"/>
  <text x="213" y="537" fill="#ccc" font-size="11">Client</text>
  <line x1="285" y1="532" x2="320" y2="532" stroke="#4a9eff" stroke-width="3"/>
  <text x="328" y="537" fill="#ccc" font-size="11">Spine-Leaf link</text>
  <line x1="460" y1="532" x2="495" y2="532" stroke="#00b894" stroke-width="3"/>
  <text x="503" y="537" fill="#ccc" font-size="11">Leaf-Client link</text>
  <text x="45" y="555" fill="#888" font-size="10">Link color: green=active, red=flapping | Labels show live outbound bps</text>
</svg>
